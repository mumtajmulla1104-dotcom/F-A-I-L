<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Us - Delhi Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📱 Join Us</h1>
    <nav>
      <a href="index.html">Game</a>
      <a href="competition.html">Competition</a>
      <a href="otp.html">Join Us</a>
    </nav>
  </header>

  <div class="container">
    <div id="phone-section">
<h2>Verify Email Address</h2>
      <form onsubmit="event.preventDefault(); sendOTP();">
        <input type="email" id="email" placeholder="Enter your email address" required>
        <button type="submit">Send OTP</button>
      </form>
    </div>

    <div id="otp-section" style="display: none;">
      <h2>Enter OTP</h2>
      <form onsubmit="event.preventDefault(); verifyOTP();">
        <input type="text" id="otp" placeholder="Enter 4-digit OTP" maxlength="4" required>
        <button type="submit">Verify</button>
      </form>
      <div id="message"></div>
    </div>

    <div id="success-section" style="display: none;">
      <h2>✅ Verified!</h2>
      <p>Thanks for joining us!</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
